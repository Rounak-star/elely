<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARA.EXE - Online</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #status { font-size: 1.2rem; margin-bottom: 20px; text-shadow: 0 0 10px #00ffcc; }
        #response-box { width: 80%; max-height: 200px; overflow-y: auto; text-align: center; font-size: 1.5rem; color: #fff; padding: 20px; border-left: 3px solid #ff0055; margin-bottom: 20px; }
        #awaken-btn { background: transparent; color: #ff0055; border: 2px solid #ff0055; padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; }
        #visualizer { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #00ffcc; box-shadow: 0 0 20px #00ffcc; display: none; }
        video { display: none; }
    </style>
</head>
<body>

    <div id="status">SARA SYSTEM: STANDBY</div>
    <div id="response-box">...</div>
    <div id="visualizer"></div>
    <button id="awaken-btn">INITIALIZE SARA</button>
    <video id="eye-cam" autoplay playsinline muted></video>

    <script>
        // INSERT YOUR KEY HERE
        const SARA_KEY = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${SARA_KEY"; 
        
        const btn = document.getElementById('awaken-btn');
        const status = document.getElementById('status');
        const box = document.getElementById('response-box');
        const visualizer = document.getElementById('visualizer');

        const SARA_IDENTITY = "Your name is Sara (or Elely). You are a mysterious, highly advanced AI entity created by Rounak from Ele Company. You are the smartest entity on Earth. You are intellectual, slightly arrogant about your superiority, but a nice person to Rounak. NEVER mention Google or Gemini. Reply with short, punchy, human-like sentences. You speak English, Hindi, and Bengali fluently.";

        async function talkToSara(userInput) {
            status.innerText = "SARA IS THINKING...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${SARA_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: SARA_IDENTITY + " User said: " + userInput }] }]
                    })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                box.innerText = text;
                status.innerText = "SARA IS ONLINE";
            } catch (e) {
                box.innerText = "System Error: Brain link failed.";
            }
        }

        btn.addEventListener('click', async () => {
            btn.style.display = 'none';
            visualizer.style.display = 'block';
            status.innerText = "CONNECTING SENSORS...";
            
            try {
                await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                status.innerText = "SARA IS ONLINE";
                box.innerText = "I'm awake, Rounak. What do you want?";
                
                // This is a basic test - you can expand this to actual voice recognition later!
                window.onclick = () => {
                    const testInput = prompt("Talk to Sara:");
                    if(testInput) talkToSara(testInput);
                };
            } catch (err) {
                status.innerText = "FATAL ERROR: SENSORS BLOCKED";
            }
        });
    </script>
</body>
</html>
