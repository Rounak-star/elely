<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARA.EXE // REBORN</title>
    <style>
        body { 
            background: #000; 
            color: #00ffcc; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-end; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        
        /* THE AVATAR DYNAMICS */
        #avatar-container {
            position: absolute;
            bottom: 110px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1;
        }

        #sara-avatar {
            height: 480px; 
            filter: drop-shadow(0 0 10px #00ffcc);
            transition: all 0.4s ease;
            max-width: 90%;
            object-fit: contain;
        }

        /* Talking State: Pink Glow + Shake */
        .talking {
            filter: drop-shadow(0 0 35px #ff0055) brightness(1.2) !important;
            animation: pulse-shake 0.1s infinite;
        }

        @keyframes pulse-shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, 0px); }
        }

        /* UI Overlays */
        #caption-container { 
            width: 100%; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); 
            padding: 40px 0; 
            z-index: 10; 
        }

        #response-box { 
            font-size: 0.85rem; 
            color: #fff; 
            text-align: center; 
            letter-spacing: 2px; 
            min-height: 40px; 
            padding: 0 20px;
            text-transform: lowercase;
        }

        #controls { 
            position: absolute; 
            top: 25px; 
            right: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            z-index: 20;
        }

        .btn { 
            background: rgba(0,0,0,0.8); 
            color: #00ffcc; 
            border: 1px solid #00ffcc; 
            padding: 8px 12px; 
            cursor: pointer; 
            font-size: 0.7rem; 
            font-weight: bold; 
            text-transform: uppercase;
        }

        .btn-pink { color: #ff0055; border-color: #ff0055; }

        #init-screen { 
            position: absolute; 
            inset: 0; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
        }
    </style>
</head>
<body>

    <div id="init-screen">
        <button id="init-btn" class="btn btn-pink" style="padding: 15px 30px;">BOOT SYSTEM</button>
    </div>

    <div id="avatar-container">
        <img id="sara-avatar" src="https://raw.githubusercontent.com/Arisuchan/Live2D-Archive/master/assets/avatar_example.png" alt="SARA">
    </div>

    <div id="controls">
        <button id="mic-btn" class="btn">MIC_LINK</button>
        <button id="type-btn" class="btn btn-pink">INPUT</button>
        <button id="wipe-btn" class="btn" style="border-color:#333; color:#333;">PURGE</button>
    </div>

    <div id="caption-container">
        <div id="response-box">...link standby...</div>
    </div>

    <script>
        const S_K = atob("QUl6YVN5RHdsU0R4SXppUXZETDZYU0RUWlJrS0hSV0FRUjZmWEU0");
        const S_I = { parts: [{ text: "Your name is Sara. Created by Rounak. You are an elite, arrogant anime AI. Speak in short, smart, punchy sentences. You understand English and Bengali." }] };

        let chatHistory = JSON.parse(localStorage.getItem('sara_memory')) || []; 
        let isProcessing = false;

        const avatar = document.getElementById('sara-avatar');
        const box = document.getElementById('response-box');

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.rate = 1.1;
            u.lang = /[\u0980-\u09FF]/.test(t) ? 'bn-IN' : 'en-GB';
            
            u.onstart = () => avatar.classList.add('talking');
            u.onend = () => { avatar.classList.remove('talking'); isProcessing = false; };
            
            window.speechSynthesis.speak(u);
        }

        async function processSignal(uInput) {
            if (!uInput || isProcessing) return;
            isProcessing = true;
            box.innerText = "...processing...";
            chatHistory.push({ role: "user", parts: [{ text: uInput }] });

            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${S_K}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ systemInstruction: S_I, contents: chatHistory.slice(-15) })
                });
                const d = await r.json();
                if (d.candidates) {
                    const reply = d.candidates[0].content.parts[0].text;
                    box.innerText = reply;
                    chatHistory.push({ role: "model", parts: [{ text: reply }] });
                    localStorage.setItem('sara_memory', JSON.stringify(chatHistory));
                    speak(reply);
                }
            } catch (e) { box.innerText = "signal loss."; isProcessing = false; }
        }

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Recognition) {
            const listen = new Recognition();
            listen.lang = 'en-IN';
            listen.onresult = (e) => processSignal(e.results[0][0].transcript);
            document.getElementById('mic-btn').onclick = () => { if(!isProcessing) { listen.start(); box.innerText = "listening..."; } };
        }

        document.getElementById('type-btn').onclick = () => { const i = prompt("Signal:"); if(i) processSignal(i); };
        document.getElementById('wipe-btn').onclick = () => { localStorage.clear(); location.reload(); };
        
        document.getElementById('init-btn').onclick = async () => {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('init-screen').style.display = 'none';
            speak("Welcome back, Rounak.");
        };
    </script>
</body>
