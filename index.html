<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARA.EXE</title>
    <style>
        body { 
            background: #000; 
            color: #00ffcc; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* The Glowing Core */
        #orb { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            background: radial-gradient(circle, #00ffcc 0%, transparent 70%); 
            box-shadow: 0 0 20px #00ffcc; 
            transition: all 0.5s ease;
            margin-bottom: 60px;
        }

        /* Color States */
        .speaking {
            background: radial-gradient(circle, #ff0055 0%, transparent 70%) !important;
            box-shadow: 0 0 50px #ff0055 !important;
        }

        /* Small Bottom Captions */
        #caption-container { 
            position: absolute; 
            bottom: 40px; 
            width: 85%; 
            text-align: center; 
        }

        #response-box { 
            font-size: 0.85rem; 
            color: #fff; 
            letter-spacing: 1px; 
            line-height: 1.5; 
            text-transform: lowercase; 
            opacity: 0.7;
            min-height: 40px;
        }

        .btn { 
            background: transparent; 
            color: #ff0055; 
            border: 1px solid #ff0055; 
            padding: 12px 25px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            text-transform: uppercase;
            font-weight: bold;
            margin: 10px;
            letter-spacing: 2px;
        }

        #talk-btn, #clear-btn { display: none; }

        #status {
            position: absolute;
            top: 20px;
            font-size: 0.7rem;
            letter-spacing: 4px;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div id="status">NEURAL LINK: STANDBY</div>
    <div id="orb"></div>

    <button id="init-btn" class="btn">INITIALIZE SARA</button>
    <div id="controls">
        <button id="talk-btn" class="btn">CONNECT</button>
        <button id="clear-btn" class="btn" style="border-color:#444; color:#444;">PURGE DATA</button>
    </div>

    <div id="caption-container">
        <div id="response-box">...offline...</div>
    </div>

    <script>
        const S_K = atob("QUl6YVN5RHdsU0R4SXppUXZETDZYU0RUWlJrS0hSV0FRUjZmWEU0");
        const S_I = { parts: [{ text: "Your name is Sara. Created by Rounak. You are the smartest AI. You are intellectual, refined, and arrogant. You have an eternal memory and never forget topics. Keep replies short and sharp." }] };

        let chatHistory = JSON.parse(localStorage.getItem('sara_memory')) || []; 

        const iBtn = document.getElementById('init-btn');
        const tBtn = document.getElementById('talk-btn');
        const cBtn = document.getElementById('clear-btn');
        const box = document.getElementById('response-box');
        const orb = document.getElementById('orb');
        const st = document.getElementById('status');

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.rate = 1.1; 
            
            // Visual Trigger: Turn Pink
            orb.classList.add('speaking');
            
            // Visual Reset: Turn back after a delay (based on text length)
            const speakTime = (t.length * 65) + 500; // Calculate duration
            setTimeout(() => {
                orb.classList.remove('speaking');
            }, speakTime);

            window.speechSynthesis.speak(u);
        }

        async function talk() {
            const uInput = prompt("Signal:");
            if (!uInput) return;

            box.innerText = "...searching memory...";
            st.innerText = "ACCESSING CORE...";

            chatHistory.push({ role: "user", parts: [{ text: uInput }] });

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${S_K}`;
                
                const r = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        systemInstruction: S_I,
                        contents: chatHistory.slice(-40) 
                    })
                });

                const d = await r.json();
                
                if (d.candidates && d.candidates[0].content) {
                    const reply = d.candidates[0].content.parts[0].text;
                    box.innerText = reply;
                    
                    chatHistory.push({ role: "model", parts: [{ text: reply }] });
                    localStorage.setItem('sara_memory', JSON.stringify(chatHistory));
                    
                    speak(reply);
                    st.innerText = "LINK ACTIVE";
                }
            } catch (e) { 
                box.innerText = "error: signal snapped."; 
            }
        }

        iBtn.onclick = async () => {
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                iBtn.style.display = 'none';
                tBtn.style.display = 'inline-block';
                cBtn.style.display = 'inline-block';
                st.innerText = "NEURAL LINK ESTABLISHED";
                
                const welcome = chatHistory.length > 0 ? "I remember you, Rounak." : "I'm awake, Rounak.";
                box.innerText = welcome.toLowerCase();
                speak(welcome);
            } catch (err) {
                box.innerText = "allow mic permissions.";
            }
        };

        tBtn.onclick = talk;

        cBtn.onclick = () => {
            if(confirm("Purge memory?")) {
                localStorage.removeItem('sara_memory');
                chatHistory = [];
                location.reload();
            }
        };
    </script>
</body>
</html>
