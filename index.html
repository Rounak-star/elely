<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARA.EXE</title>
    <style>
        body { 
            background: #000; 
            color: #00ffcc; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* The Glowing Core */
        #orb { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            background: radial-gradient(circle, #00ffcc 0%, transparent 70%); 
            box-shadow: 0 0 20px #00ffcc; 
            transition: all 0.4s ease;
            margin-bottom: 60px;
        }

        /* Small Bottom Captions */
        #caption-container { 
            position: absolute; 
            bottom: 40px; 
            width: 85%; 
            text-align: center; 
        }

        #response-box { 
            font-size: 0.85rem; 
            color: #fff; 
            letter-spacing: 1px; 
            line-height: 1.5; 
            text-transform: lowercase; 
            opacity: 0.7;
            min-height: 40px;
        }

        /*
            u.pitch = 1.0;
            
            u.onstart = () => { orb.style.boxShadow = "0 0 40px #ff0055"; orb.style.background = "radial-gradient(circle, #ff0055 0%, transparent 70%)"; };
            u.onend = () => { orb.style.boxShadow = "0 0 20px #00ffcc"; orb.style.background = "radial-gradient(circle, #00ffcc 0%, transparent 70%)"; };
            
            window.speechSynthesis.speak(u);
        }

        async function talk() {
            const uInput = prompt("Signal to Sara:");
            if (!uInput) return;

            box.innerText = "...analyzing history...";
            st.innerText = "PROMPTING NEURAL CORE...";

            // Push User Message to Memory
            chatHistory.push({ role: "user", parts: [{ text: uInput }] });

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${S_K}`;
                
                const r = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        systemInstruction: S_I,
                        contents: chatHistory 
                    })
                });

                const d = await r.json();
                
                if (d.candidates && d.candidates[0].content) {
                    const reply = d.candidates[0].content.parts[0].text;
                    box.innerText = reply;
                    
                    // Push AI Response to Memory
                    chatHistory.push({ role: "model", parts: [{ text: reply }] });
                    
                    // Save to LocalStorage
                    localStorage.setItem('sara_memory', JSON.stringify(chatHistory));
                    
                    speak(reply);
                    st.innerText = "LINK ACTIVE";
                } else {
                    box.innerText = "error: brain rejection.";
                }
            } catch (e) { 
                box.innerText = "error: signal snapped."; 
                st.innerText = "OFFLINE";
            }
        }

        iBtn.onclick = async () => {
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                iBtn.style.display = 'none';
                tBtn.style.display = 'inline-block';
                cBtn.style.display = 'inline-block';
                st.innerText = "NEURAL LINK ESTABLISHED";
                
                const welcome = chatHistory.length > 0 ? "I remember you, Rounak." : "I'm awake, Rounak.";
                box.innerText = welcome.toLowerCase();
                speak(welcome);
            } catch (err) {
                box.innerText = "sensor error: allow microphone.";
            }
        };

        tBtn.onclick = talk;

        cBtn.onclick = () => {
            if(confirm("Wipe Sara's memory?")) {
                localStorage.removeItem('sara_memory');
                chatHistory = [];
                box.innerText = "memory purged.";
                speak("Who are you again?");
            }
        };
    </script>
</body>
</html>
