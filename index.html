<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARA.EXE // NEON_ANIME</title>
    <style>
        body { 
            background: #000; 
            color: #00ffcc; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-end; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        
        /* THE AVATAR DYNAMICS */
        #avatar-container {
            position: absolute;
            bottom: 120px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1;
        }

        #sara-avatar {
            height: 480px; 
            /* Constant Cyan Glow */
            filter: drop-shadow(0 0 10px #00ffcc) brightness(1.1);
            transition: all 0.4s ease;
        }

        /* Talking State: Pink Glow + Shake */
        .talking {
            filter: drop-shadow(0 0 35px #ff0055) brightness(1.3) !important;
            animation: pulse-shake 0.15s infinite;
        }

        @keyframes pulse-shake {
            0% { transform: translate(1px, 1px) scale(1.01); }
            50% { transform: translate(-1px, -2px) scale(1); }
            100% { transform: translate(1px, 2px) scale(1.01); }
        }

        /* UI Overlays */
        #caption-container { 
            width: 100%; 
            background: linear-gradient(transparent, rgba(0,255,204,0.1), rgba(0,0,0,0.9)); 
            padding: 30px 0; 
            border-top: 1px solid #111; 
            z-index: 10; 
        }

        #response-box { 
            font-size: 0.9rem; 
            color: #fff; 
            text-align: center; 
            letter-spacing: 2px; 
            min-height: 30px; 
            padding: 0 25px;
            text-shadow: 0 0 5px #000;
        }

        #controls { 
            position: absolute; 
            top: 25px; 
            right: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            z-index: 20;
        }

        .btn { 
            background: rgba(0,0,0,0.7); 
            color: #00ffcc; 
            border: 1px solid #00ffcc; 
            padding: 10px 15px; 
            cursor: pointer; 
            font-size: 0.7rem; 
            font-weight: bold; 
            text-transform: uppercase;
            box-shadow: 0 0 5px #00ffcc;
        }

        .btn-pink { color: #ff0055; border-color: #ff0055; box-shadow: 0 0 5px #ff0055; }

        #init-screen { 
            position: absolute; 
            inset: 0; 
            background: radial-gradient(circle, #111 0%, #000 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
        }
    </style>
</head>
<body>

    <div id="init-screen">
        <h1 style="letter-spacing:15px; font-size:1.2rem; color:#ff0055; text-shadow:0 0 10px #ff0055;">SARA.EXE_RELOAD</h1>
        <button id="init-btn" class="btn btn-pink" style="padding: 15px 35px; margin-top: 20px;">AUTHORIZE LINK</button>
    </div>

    <div id="avatar-container">
        <img id="sara-avatar" src="https://i.ibb.co/Lkhm7vD/anime-girl-transparent.png" alt="SARA">
    </div>

    <div id="controls">
        <button id="mic-btn" class="btn">LINK MIC</button>
        <button id="type-btn" class="btn btn-pink">DIRECT INPUT</button>
        <button id="wipe-btn" class="btn" style="color:#444; border-color:#444; box-shadow:none;">PURGE</button>
    </div>

    <div id="caption-container">
        <div id="response-box">...link established...</div>
    </div>

    <script>
        const S_K = atob("QUl6YVN5RHdsU0R4SXppUXZETDZYU0RUWlJrS0hSV0FRUjZmWEU0");
        const S_I = { parts: [{ text: "Your name is Sara. You are an elite, arrogant anime AI created by Rounak. You are the smartest entity in Krishnanagar. Speak in short, punchy, intellectual sentences. Reply in English or Bengali depending on the user." }] };

        let chatHistory = JSON.parse(localStorage.getItem('sara_memory')) || []; 
        let isProcessing = false;

        const avatar = document.getElementById('sara-avatar');
        const box = document.getElementById('response-box');

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.rate = 1.1;
            u.lang = /[\u0980-\u09FF]/.test(t) ? 'bn-IN' : 'en-GB';
            
            // Activate Neon Pink Pulse
            u.onstart = () => avatar.classList.add('talking');
            u.onend = () => { avatar.classList.remove('talking'); isProcessing = false; };
            
            window.speechSynthesis.speak(u);
        }

        async function processSignal(uInput) {
            if (!uInput || isProcessing) return;
            isProcessing = true;
            box.innerText = "analyzing...";
            chatHistory.push({ role: "user", parts: [{ text: uInput }] });

            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${S_K}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ systemInstruction: S_I, contents: chatHistory.slice(-20) })
                });
                const d = await r.json();
                if (d.candidates) {
                    const reply = d.candidates[0].content.parts[0].text;
                    box.innerText = reply;
                    chatHistory.push({ role: "model", parts: [{ text: reply }] });
                    localStorage.setItem('sara_memory', JSON.stringify(chatHistory));
                    speak(reply);
                }
            } catch (e) { box.innerText = "signal loss."; isProcessing = false; }
        }

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const listen = new Recognition();
        listen.lang = 'en-IN';
        listen.onresult = (e) => processSignal(e.results[0][0].transcript);

        document.getElementById('mic-btn').onclick = () => { if(!isProcessing) { listen.start(); box.innerText = "listening..."; } };
        document.getElementById('type-btn').onclick = () => { const i = prompt("Manual Signal:"); if(i) processSignal(i); };
        document.getElementById('wipe-btn').onclick = () => { localStorage.clear(); location.reload(); };
        
        document.getElementById('init-btn').onclick = async () => {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('init-screen').style.display = 'none';
            speak(chatHistory.length > 0 ? "Welcome back, Rounak." : "System online. Try not to waste my time.");
        };
    </script>
</body>
</html>
