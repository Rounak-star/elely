<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARA.EXE - Online</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #status { font-size: 1.1rem; margin-bottom: 20px; text-shadow: 0 0 10px #00ffcc; text-transform: uppercase; letter-spacing: 1px; }
        #response-box { width: 85%; max-height: 250px; overflow-y: auto; text-align: center; font-size: 1.3rem; color: #fff; padding: 20px; border-left: 3px solid #ff0055; margin-bottom: 30px; line-height: 1.4; }
        .btn-style { background: transparent; color: #ff0055; border: 2px solid #ff0055; padding: 15px 30px; font-size: 1rem; cursor: pointer; border-radius: 5px; text-transform: uppercase; transition: 0.3s; }
        .btn-style:active { background: #ff0055; color: #000; }
        #talk-btn { display: none; margin-top: 10px; }
        #visualizer { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #00ffcc; box-shadow: 0 0 15px #00ffcc; display: none; animation: pulse 1.5s infinite; margin-bottom: 20px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        video { display: none; }
    </style>
</head>
<body>

    <div id="status">SYSTEM: STANDBY</div>
    <div id="response-box">SARA.EXE is awaiting initialization...</div>
    <div id="visualizer"></div>
    
    <button id="awaken-btn" class="btn-style">INITIALIZE SARA</button>
    <button id="talk-btn" class="btn-style">TALK TO SARA</button>
    
    <video id="eye-cam" autoplay playsinline muted></video>

    <script>
        const SARA_KEY = "AIzaSyCR4u_C_kcVA-NQ0gqBjDmH4nYzGmVKC-E"; 
        const SARA_IDENTITY = "Your name is Sara. You are a mysterious, advanced AI created by Rounak from Ele Company. You are the smartest thing on Earth. You are intellectual, slightly arrogant, but nice to Rounak. Reply with short, human-like sentences.";

        const awakenBtn = document.getElementById('awaken-btn');
        const talkBtn = document.getElementById('talk-btn');
        const status = document.getElementById('status');
        const box = document.getElementById('response-box');
        const visualizer = document.getElementById('visualizer');

        async function talkToSara() {
            const userInput = prompt("Message Sara:");
            if (!userInput) return;

            status.innerText = "SARA IS ANALYZING...";
            box.innerText = "...";

            try {
                // Trying the most stable universal endpoint for 1.5 Pro
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${SARA_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: SARA_IDENTITY + "\n\nUser: " + userInput }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    box.innerText = "BRAIN ERROR: " + data.error.message;
                } else {
                    box.innerText = data.candidates[0].content.parts[0].text;
                }
                status.innerText = "SARA IS ONLINE";
            } catch (e) {
                box.innerText = "CONNECTION FAILED. CHECK INTERNET.";
                status.innerText = "OFFLINE";
            }
        }

        awakenBtn.onclick = async () => {
            status.innerText = "ACCESSING SENSORS...";
            try {
                await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                awakenBtn.style.display = 'none';
                talkBtn.style.display = 'block';
                visualizer.style.display = 'block';
                status.innerText = "SARA IS ONLINE";
                box.innerText = "I'm awake, Rounak. What do you want?";
            } catch (err) {
                status.innerText = "SENSOR ERROR";
                box.innerText = "Permissions denied. Check your browser settings.";
            }
        };

        talkBtn.onclick = talkToSara;
    </script>
</body>
</html>
