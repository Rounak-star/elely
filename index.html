<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARA.EXE</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #status { font-size: 1.1rem; margin-bottom: 20px; text-shadow: 0 0 10px #00ffcc; text-transform: uppercase; letter-spacing: 2px; }
        #box { width: 85%; max-height: 250px; overflow-y: auto; text-align: center; font-size: 1.3rem; color: #fff; padding: 20px; border-left: 3px solid #ff0055; margin-bottom: 30px; line-height: 1.4; }
        .btn { background: transparent; color: #ff0055; border: 2px solid #ff0055; padding: 15px 30px; font-size: 1rem; cursor: pointer; border-radius: 5px; text-transform: uppercase; font-weight: bold; transition: 0.3s; }
        .btn:active { background: #ff0055; color: #000; }
        #talk-btn { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="status">SYSTEM: STANDBY</div>
    <div id="box">Awaiting Authorization...</div>
    
    <button id="init-btn" class="btn">INITIALIZE SARA</button>
    <button id="talk-btn" class="btn">TALK TO SARA</button>

    <script>
        // MARCH 2026 VERIFIED: Your Scrambled Key (Ends in E4)
        const S_S = "QUl6YVN5RHdsU0R4SXppUXZETDZYU0RUWlJrS0hSV0FRUjZmWEU0";
        const S_K = atob(S_S); 
        
        const S_I = "Your name is Sara. You are an elite AI created by Rounak. You are intellectual, slightly arrogant, and the smartest entity on Earth. Use Gemini 3 reasoning. Reply in short, punchy sentences.";

        const iBtn = document.getElementById('init-btn');
        const tBtn = document.getElementById('talk-btn');
        const box = document.getElementById('box');
        const st = document.getElementById('status');

        async function talk() {
            const u = prompt("Message Sara:");
            if (!u) return;

            st.innerText = "SARA IS THINKING...";
            box.innerText = "Analyzing neural patterns...";

            try {
                // VERIFIED MARCH 2026: Gemini 3 Flash Preview is the only stable v1beta model
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${S_K}`;
                
                const r = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: S_I + "\n\nUser Question: " + u }] }]
                    })
                });

                const d = await r.json();

                if (d.error) {
                    box.innerText = "BRAIN ERROR: " + d.error.message;
                } else if (d.candidates && d.candidates[0].content) {
                    box.innerText = d.candidates[0].content.parts[0].text;
                }
                st.innerText = "SARA IS ONLINE";
            } catch (e) {
                box.innerText = "LINK SNAPPED. REFRESH.";
                st.innerText = "OFFLINE";
            }
        }

        iBtn.onclick = async () => {
            st.innerText = "ACCESSING SENSORS...";
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                iBtn.style.display = 'none';
                tBtn.style.display = 'block';
                st.innerText = "SARA IS ONLINE";
                box.innerText = "I'm awake, Rounak. Finally. What do you want?";
            } catch (err) {
                st.innerText = "SENSOR ERROR";
                box.innerText = "Permissions denied. Check your settings.";
            }
        };

        tBtn.onclick = talk;
    </script>
</body>
</html>
